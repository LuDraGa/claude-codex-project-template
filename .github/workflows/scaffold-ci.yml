name: Scaffold CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scaffold-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify scaffold files
        run: ./scripts/verify-scaffold.sh

      - name: Enforce archive file renames
        run: ./scripts/check-archive-renames.sh

  optional-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python tests (if present)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: |
          pipx install uv
          uv sync
          uv run pytest

      - name: Run Node tests (if present)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci
          npm test
